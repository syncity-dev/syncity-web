version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "pnpm"
    versioning-strategy: increase-if-necessary
    cooldown:
      default-days: 7
      semver-major-days: 14
    allow:
      - dependency-type: "direct"
    rebase-strategy: "auto"

    groups:
      # Core Framework
      react:
        patterns:
          - "react"
          - "react-dom"
        update-types:
          - "minor"
          - "patch"

      tanstack:
        patterns:
          - "@tanstack/*"
        update-types:
          - "minor"
          - "patch"

      typescript:
        patterns:
          - "typescript"
        update-types:
          - "minor"
          - "patch"

      # UI & Styling
      ark-ui:
        patterns:
          - "@ark-ui/*"
        update-types:
          - "minor"
          - "patch"

      radix-ui:
        patterns:
          - "@radix-ui/*"
        update-types:
          - "minor"
          - "patch"

      panda-css:
        patterns:
          - "@pandacss/*"
        update-types:
          - "minor"
          - "patch"

      lucide:
        patterns:
          - "lucide-react"
          - "react-icons"
        update-types:
          - "minor"
          - "patch"

      # Build Tools
      vite:
        patterns:
          - "@vitejs/*"
          - "vite"
          - "vite-*"
        update-types:
          - "minor"
          - "patch"

      # Type Definitions
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"

      # Linting & Formatting
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint*"
          - "typescript-eslint"
          - "prettier"
        update-types:
          - "minor"
          - "patch"

      # Commit & Git Hooks
      commitlint:
        patterns:
          - "@commitlint/*"
          - "husky"
          - "lint-staged"
        update-types:
          - "minor"
          - "patch"

    # Ignore major version updates (require manual review)
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tanstack/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@ark-ui/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@pandacss/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      time: "06:00"
    labels:
      - "dependencies"
      - "ci"
